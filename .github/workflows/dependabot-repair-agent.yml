name: Dependabot Repair Agent

on:
  schedule:
    - cron: "15 9 * * 1"
  workflow_dispatch:
    inputs:
      max_prs:
        description: "Manual-only maximum number of red Dependabot PRs to process"
        required: false
        default: "2"
      pr_number:
        description: "Optional specific Dependabot PR number to target"
        required: false
        default: ""
      force_rerun:
        description: "Force a targeted rerun even if the PR already has a repair marker"
        required: false
        default: "false"
      healthcheck_only:
        description: "Validate Copilot CLI authentication without processing a Dependabot PR"
        required: false
        type: boolean
        default: false

concurrency:
  group: dependabot-repair-agent
  cancel-in-progress: false

env:
  COPILOT_CLI_VERSION: "1.0.73"

jobs:
  copilot-auth-healthcheck:
    name: Validate Copilot repair authentication
    if: github.event_name == 'workflow_dispatch' && inputs.healthcheck_only == true
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout repository without persisted credentials
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Install pinned Copilot CLI
        run: npm install -g "@github/copilot@${COPILOT_CLI_VERSION}"

      - name: Validate Copilot token
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_ACTIONS_TOKEN }}
        run: |
          if [[ -z "$COPILOT_GITHUB_TOKEN" ]]; then
            echo "COPILOT_ACTIONS_TOKEN is missing." >&2
            exit 1
          fi

          STATUS="$(curl --silent --show-error \
            --output "$RUNNER_TEMP/copilot-token-user.json" \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer $COPILOT_GITHUB_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            https://api.github.com/user)"
          if [[ "$STATUS" != "200" ]]; then
            echo "COPILOT_ACTIONS_TOKEN failed GitHub authentication (HTTP $STATUS)." >&2
            exit 1
          fi

      - name: Exercise Copilot request permission
        env:
          COPILOT_ALLOW_ALL: "true"
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_ACTIONS_TOKEN }}
        run: |
          OUTPUT="$(copilot \
            --prompt "Reply with exactly COPILOT_AUTH_OK. Do not use tools." \
            --no-ask-user \
            --silent)"
          if [[ "$OUTPUT" != *"COPILOT_AUTH_OK"* ]]; then
            echo "Copilot authenticated but did not complete the health-check request." >&2
            exit 1
          fi
          echo "Copilot CLI authentication and request permission are healthy."

  scan-red-prs:
    name: Scan red Dependabot PRs
    if: github.event_name != 'workflow_dispatch' || inputs.healthcheck_only != true
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: read
      pull-requests: read
    outputs:
      count: ${{ steps.collect.outputs.count }}
      targets: ${{ steps.collect.outputs.targets }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Collect repair targets
        id: collect
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          MAX_PRS_INPUT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_prs || '' }}
          PR_NUMBER: ${{ github.event.inputs.pr_number || '' }}
          FORCE_RERUN: ${{ github.event.inputs.force_rerun || 'false' }}
        run: |
          LIMIT_ARGS=()
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ ! "$MAX_PRS_INPUT" =~ ^[0-9]+$ ]]; then
              echo "workflow_dispatch max_prs must be an integer between 1 and 5." >&2
              exit 2
            fi

            if (( MAX_PRS_INPUT < 1 || MAX_PRS_INPUT > 5 )); then
              echo "workflow_dispatch max_prs must be between 1 and 5." >&2
              exit 2
            fi

            LIMIT_ARGS+=(--limit "$MAX_PRS_INPUT")
          fi

          if [[ -n "$PR_NUMBER" ]]; then
            FORCE_ARGS=()
            if [[ "$FORCE_RERUN" == "true" ]]; then
              FORCE_ARGS+=(--force)
            fi

            python scripts/dependabot_repair_agent.py scan \
              "${LIMIT_ARGS[@]}" \
              --pr-number "$PR_NUMBER" \
              "${FORCE_ARGS[@]}" \
              --output "$RUNNER_TEMP/targets.json"
          else
            python scripts/dependabot_repair_agent.py scan \
              "${LIMIT_ARGS[@]}" \
              --output "$RUNNER_TEMP/targets.json"
          fi

          echo "count=$(jq 'length' "$RUNNER_TEMP/targets.json")" >> "$GITHUB_OUTPUT"
          echo "targets=$(jq -c . "$RUNNER_TEMP/targets.json")" >> "$GITHUB_OUTPUT"

  repair-red-prs:
    name: Repair red Dependabot PRs
    needs: scan-red-prs
    if: needs.scan-red-prs.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        target: ${{ fromJson(needs.scan-red-prs.outputs.targets) }}
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
      statuses: write
    env:
      REPAIR_AGENT_TARGET_PATH: .github/agents/dependabot-repair.agent.md

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Define repair paths
        run: |
          BASE_DIR="$GITHUB_WORKSPACE/tmp/dependabot-repair/${{ matrix.target.number }}"
          {
            echo "REPAIR_CONTEXT_DIR=$BASE_DIR"
            echo "REPAIR_ORCHESTRATOR_PATH=$BASE_DIR/dependabot_repair_agent.py"
            echo "REPAIR_AGENT_SPEC_PATH=$BASE_DIR/dependabot-repair.agent.md"
            echo "REPAIR_AGENT_BACKUP_PATH=$BASE_DIR/dependabot-repair.agent.backup.md"
          } >> "$GITHUB_ENV"

      - name: Install pinned Copilot CLI
        run: npm install -g "@github/copilot@${COPILOT_CLI_VERSION}"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Materialize TASK-116 repair tooling
        run: |
          rm -rf "$REPAIR_CONTEXT_DIR"
          mkdir -p "$REPAIR_CONTEXT_DIR"
          cp scripts/dependabot_repair_agent.py "$REPAIR_ORCHESTRATOR_PATH"
          cp .github/agents/dependabot-repair.agent.md "$REPAIR_AGENT_SPEC_PATH"

      - name: Preflight Copilot authentication
        id: preflight
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_ACTIONS_TOKEN }}
        run: |
          if [[ -z "$COPILOT_GITHUB_TOKEN" ]]; then
            echo "COPILOT_ACTIONS_TOKEN is missing." >&2
            exit 1
          fi

          STATUS="$(curl --silent --show-error \
            --output "$RUNNER_TEMP/copilot-token-user.json" \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer $COPILOT_GITHUB_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            https://api.github.com/user)"
          if [[ "$STATUS" != "200" ]]; then
            echo "COPILOT_ACTIONS_TOKEN failed GitHub authentication (HTTP $STATUS)." >&2
            exit 1
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Prepare Copilot repair context
        if: steps.preflight.outputs.ready == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ matrix.target.number }}
        run: |
          python "$REPAIR_ORCHESTRATOR_PATH" prepare \
            --pr-number "$PR_NUMBER" \
            --prompt-path "$REPAIR_CONTEXT_DIR/prompt.md" \
            --result-path "$REPAIR_CONTEXT_DIR/result.json" \
            --log-path "$REPAIR_CONTEXT_DIR/failure.log"

      - name: Verify repair context files
        if: steps.preflight.outputs.ready == 'true'
        run: |
          test -f "$REPAIR_CONTEXT_DIR/prompt.md"
          test -f "$REPAIR_CONTEXT_DIR/failure.log"
          ls -la "$REPAIR_CONTEXT_DIR"

      - name: Checkout Dependabot update on repo-owned branch
        if: steps.preflight.outputs.ready == 'true'
        env:
          HEAD_REF: ${{ matrix.target.head_ref }}
          REPAIR_BRANCH: ${{ matrix.target.replacement_branch }}
        run: |
          git fetch origin main
          git fetch origin "$HEAD_REF:refs/remotes/origin/$HEAD_REF"
          git checkout -B "$REPAIR_BRANCH" origin/main
          mapfile -t pr_commits < <(git rev-list --reverse "origin/main..refs/remotes/origin/$HEAD_REF")
          if [[ "${#pr_commits[@]}" -eq 0 ]]; then
            echo "No commits found on $HEAD_REF ahead of origin/main."
            exit 1
          fi
          git cherry-pick "${pr_commits[@]}"
          echo "REPAIR_BASELINE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Inject TASK-116 repair agent spec
        if: steps.preflight.outputs.ready == 'true'
        run: |
          mkdir -p "$(dirname "$REPAIR_AGENT_TARGET_PATH")"
          if [[ -f "$REPAIR_AGENT_TARGET_PATH" ]]; then
            cp "$REPAIR_AGENT_TARGET_PATH" "$REPAIR_AGENT_BACKUP_PATH"
          fi
          cp "$REPAIR_AGENT_SPEC_PATH" "$REPAIR_AGENT_TARGET_PATH"

      - name: Run Copilot repair agent
        id: copilot
        if: steps.preflight.outputs.ready == 'true'
        continue-on-error: true
        env:
          COPILOT_ALLOW_ALL: "true"
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_ACTIONS_TOKEN }}
        run: |
          set -o pipefail
          PROMPT="$(cat "$REPAIR_CONTEXT_DIR/prompt.md")"
          copilot \
            --agent dependabot-repair \
            --prompt "$PROMPT" \
            --silent 2>&1 | tee "$REPAIR_CONTEXT_DIR/copilot-output.log"

      - name: Restore repair agent spec
        if: always() && steps.preflight.outputs.ready == 'true'
        run: |
          if [[ -f "$REPAIR_AGENT_BACKUP_PATH" ]]; then
            cp "$REPAIR_AGENT_BACKUP_PATH" "$REPAIR_AGENT_TARGET_PATH"
          else
            rm -f "$REPAIR_AGENT_TARGET_PATH"
            rmdir .github/agents 2>/dev/null || true
          fi

      - name: Inspect Copilot repair outputs
        if: always() && steps.preflight.outputs.ready == 'true'
        run: |
          ls -la "$REPAIR_CONTEXT_DIR"
          if [[ -f "$REPAIR_CONTEXT_DIR/result.json" ]]; then
            cat "$REPAIR_CONTEXT_DIR/result.json"
          else
            echo "No result.json produced by Copilot."
          fi

      - name: Validate Copilot repair result contract
        id: result-contract
        if: always() && steps.preflight.outputs.ready == 'true' && steps.copilot.outcome != 'skipped'
        run: |
          if python "$REPAIR_ORCHESTRATOR_PATH" validate-result \
            --result-path "$REPAIR_CONTEXT_DIR/result.json" \
            --copilot-output-path "$REPAIR_CONTEXT_DIR/copilot-output.log"; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git authentication for deterministic finalization
        if: always() && steps.preflight.outputs.ready == 'true' && steps.copilot.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh auth setup-git

      - name: Finalize superseding PR workflow
        if: always() && steps.preflight.outputs.ready == 'true' && steps.copilot.outcome != 'skipped'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ matrix.target.number }}
          HEAD_SHA: ${{ matrix.target.head_sha }}
          REPAIR_BRANCH: ${{ matrix.target.replacement_branch }}
          REPAIR_BASELINE_SHA: ${{ env.REPAIR_BASELINE_SHA }}
        run: |
          python "$REPAIR_ORCHESTRATOR_PATH" finalize \
            --pr-number "$PR_NUMBER" \
            --head-sha "$HEAD_SHA" \
            --replacement-branch "$REPAIR_BRANCH" \
            --baseline-sha "$REPAIR_BASELINE_SHA" \
            --result-path "$REPAIR_CONTEXT_DIR/result.json" \
            --copilot-output-path "$REPAIR_CONTEXT_DIR/copilot-output.log"

      - name: Assert repair-agent health
        if: always() && steps.preflight.outputs.ready == 'true' && steps.copilot.outcome != 'skipped'
        env:
          COPILOT_OUTCOME: ${{ steps.copilot.outcome }}
          RESULT_VALID: ${{ steps.result-contract.outputs.valid }}
        run: |
          if [[ "$RESULT_VALID" != "true" ]]; then
            echo "Copilot did not produce a valid repair decision; failing the workflow so operators are alerted." >&2
            exit 1
          fi

          if [[ "$COPILOT_OUTCOME" != "success" ]]; then
            echo "::warning::Copilot exited non-zero after producing a valid structured result."
          fi
