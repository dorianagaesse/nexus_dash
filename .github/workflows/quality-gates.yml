name: Quality Gates

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-gates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-core:
    name: Quality Core (lint, test, coverage, build)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/nexusdash?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/nexusdash?schema=public
      AGENT_TOKEN_SIGNING_SECRET: ci-placeholder-agent-token-signing-secret-0123456789
      RESEND_API_KEY: ci-placeholder-resend-key

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Check product version policy
        if: github.event_name == 'pull_request'
        env:
          VERSION_POLICY_BASE_REF: origin/${{ github.base_ref }}
          VERSION_POLICY_BRANCH_NAME: ${{ github.head_ref }}
        run: |
          git fetch --no-tags --prune origin "+refs/heads/${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
          npm run release:check

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Check RLS model inventory
        run: npm run rls:check

      - name: Lint
        run: npm run lint

      - name: Unit/API tests
        run: npm test

      - name: Coverage gate
        run: npm run test:coverage

      - name: Build
        run: npm run build

  e2e-smoke:
    name: E2E Smoke (Playwright)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nexusdash
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nexusdash"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/nexusdash?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/nexusdash?schema=public
      AGENT_TOKEN_SIGNING_SECRET: ci-placeholder-agent-token-signing-secret-0123456789
      NODE_ENV: test
      RESEND_API_KEY: ci-placeholder-resend-key

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply Prisma migrations
        run: npm run db:migrate

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke suite
        run: npm run test:e2e

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  tenant-isolation:
    name: Tenant Isolation (PostgreSQL RLS)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: nexusdash
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nexusdash"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/nexusdash?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/nexusdash?schema=public
      RLS_TEST_ADMIN_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/nexusdash
      RLS_TEST_RUNTIME_DATABASE_URL: postgresql://nexusdash_rls_test:nexusdash_rls_test@127.0.0.1:5432/nexusdash

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply Prisma migrations with admin connection
        run: npm run db:migrate

      - name: Provision least-privilege runtime role
        run: npm run test:rls:setup

      - name: Run tenant-isolation matrix as runtime role
        run: npm run test:rls

  container-image:
    name: Container Image (build + metadata artifact)
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    needs:
      - quality-core
      - e2e-smoke
      - tenant-isolation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build container image
        run: docker buildx build --load --tag nexusdash:${{ github.sha }} .

      - name: Export image metadata
        run: |
          docker image inspect nexusdash:${{ github.sha }} --format '{{json .}}' > container-image-metadata.json

      - name: Upload image metadata artifact
        uses: actions/upload-artifact@v7
        with:
          name: container-image-metadata
          path: container-image-metadata.json
          if-no-files-found: error
