name: "Check Branch Name"
on:
  pull_request:
    types: [opened, edited, synchronize]
  workflow_dispatch:

jobs:
  check-name:
    runs-on: ubuntu-latest
    steps:
      - name: Verify branch naming
        env:
          EVENT_NAME: ${{ github.event_name }}
          PULL_REQUEST_BRANCH_NAME: ${{ github.head_ref }}
          DISPATCH_BRANCH_NAME: ${{ github.ref_name }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login || '' }}
        run: |
          HUMAN_PATTERN="^(feature|fix|refactor|docs|chore)\/.*"
          DEPENDABOT_PATTERN="^dependabot\/.*"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            BRANCH_NAME="$DISPATCH_BRANCH_NAME"
          else
            BRANCH_NAME="$PULL_REQUEST_BRANCH_NAME"
          fi

          if [[ "$PR_AUTHOR" == "dependabot[bot]" || "$PR_AUTHOR" == "dependabot-preview[bot]" ]]; then
            if [[ $BRANCH_NAME =~ $DEPENDABOT_PATTERN ]]; then
              exit 0
            fi

            echo "Error: Dependabot PR branch '$BRANCH_NAME' must start with dependabot/."
            exit 1
          fi

          if [[ ! $BRANCH_NAME =~ $HUMAN_PATTERN ]]; then
            echo "Error: The branch name '$BRANCH_NAME' does not follow the convention."
            echo "It must start with feature/, fix/, refactor/, docs/, or chore/."
            exit 1
          fi
