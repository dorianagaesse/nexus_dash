name: Dependabot Auto Triage

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]
  workflow_run:
    workflows:
      - "Quality Gates"
      - "Check Branch Name"
    types: [completed]

jobs:
  triage-safe-pr:
    name: Triage safe Dependabot lanes
    if: >
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.user.login == 'dependabot[bot]' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}
      REQUIRED_CHECK_NAMES_JSON: '["check-name","Quality Core (lint, test, coverage, build)","E2E Smoke (Playwright)","Container Image (build + metadata artifact)"]'

    steps:
      - name: Classify Dependabot lane
        id: classify
        shell: bash
        run: |
          HEAD_REF="${{ github.event.pull_request.head.ref }}"
          SAFE=false
          LANE="manual-review"

          if [[ "$HEAD_REF" == dependabot/github_actions/* ]]; then
            SAFE=true
            LANE="github-actions"
          elif [[ "$HEAD_REF" == dependabot/npm_and_yarn/safe-dev-dependencies* ]]; then
            SAFE=true
            LANE="safe-dev-dependencies"
          elif [[ "$HEAD_REF" == dependabot/npm_and_yarn/safe-production-utilities* ]]; then
            SAFE=true
            LANE="safe-production-utilities"
          fi

          echo "safe=$SAFE" >> "$GITHUB_OUTPUT"
          echo "lane=$LANE" >> "$GITHUB_OUTPUT"

      - name: Label safe auto-merge candidate
        if: steps.classify.outputs.safe == 'true'
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --add-label "dependabot:auto-merge" \
            --remove-label "dependabot:manual-review"

      - name: Label manual-review dependency PR
        if: steps.classify.outputs.safe != 'true'
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" \
            --add-label "dependabot:manual-review" \
            --remove-label "dependabot:auto-merge"

      - name: Approve safe Dependabot lane
        if: steps.classify.outputs.safe == 'true'
        shell: bash
        run: |
          gh pr review "${{ github.event.pull_request.number }}" \
            --approve \
            --body "Safe Dependabot lane '${{ steps.classify.outputs.lane }}' approved automatically. This PR will be merged once all required checks pass." \
            || true

  merge-safe-pr:
    name: Merge safe Dependabot PR after green checks
    if: >
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      GH_REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Merge safe Dependabot PR
        shell: bash
        run: |
          PR_NUMBER="${{ github.event.workflow_run.pull_requests[0].number }}"

          if [[ -z "$PR_NUMBER" ]]; then
            echo "No pull request attached to this workflow run."
            exit 0
          fi

          PR_JSON="$(gh pr view "$PR_NUMBER" --json author,isDraft,labels,mergeStateStatus,state,statusCheckRollup,url)"
          PR_STATE="$(echo "$PR_JSON" | jq -r '.state')"
          PR_AUTHOR="$(echo "$PR_JSON" | jq -r '.author.login')"
          IS_DRAFT="$(echo "$PR_JSON" | jq -r '.isDraft')"

          if [[ "$PR_STATE" != "OPEN" ]]; then
            echo "PR #$PR_NUMBER is not open anymore."
            exit 0
          fi

          if [[ "$PR_AUTHOR" != "dependabot[bot]" && "$PR_AUTHOR" != "app/dependabot" ]]; then
            echo "PR #$PR_NUMBER is not authored by Dependabot."
            exit 0
          fi

          if [[ "$IS_DRAFT" == "true" ]]; then
            echo "PR #$PR_NUMBER is still a draft."
            exit 0
          fi

          HAS_AUTO_LABEL=""
          INCOMPLETE_COUNT=""
          MERGE_STATE=""

          for attempt in {1..6}; do
            if ! PR_JSON="$(gh pr view "$PR_NUMBER" --json labels,mergeStateStatus,statusCheckRollup)"; then
              echo "Failed to fetch PR #$PR_NUMBER status (attempt $attempt/6)."
              if [[ "$attempt" -lt 6 ]]; then
                sleep 10
                continue
              fi
              exit 1
            fi

            if ! HAS_AUTO_LABEL="$(echo "$PR_JSON" | jq -r '[.labels[].name] | index("dependabot:auto-merge") != null')"; then
              echo "Failed to parse auto-merge label for PR #$PR_NUMBER (attempt $attempt/6)."
              if [[ "$attempt" -lt 6 ]]; then
                sleep 10
                continue
              fi
              exit 1
            fi

            if ! INCOMPLETE_COUNT="$(echo "$PR_JSON" | jq --argjson required "$REQUIRED_CHECK_NAMES_JSON" '
              [
                $required[] as $required_name
                | (
                    [.statusCheckRollup[] | select(.name == $required_name)]
                    | if length == 0 then
                        true
                      else
                        any(.status != "COMPLETED" or .conclusion != "SUCCESS")
                      end
                  )
                | select(. == true)
              ]
              | length
            ')"; then
              echo "Failed to parse status checks for PR #$PR_NUMBER (attempt $attempt/6)."
              if [[ "$attempt" -lt 6 ]]; then
                sleep 10
                continue
              fi
              exit 1
            fi

            if ! MERGE_STATE="$(echo "$PR_JSON" | jq -r '.mergeStateStatus')"; then
              echo "Failed to parse merge state for PR #$PR_NUMBER (attempt $attempt/6)."
              if [[ "$attempt" -lt 6 ]]; then
                sleep 10
                continue
              fi
              exit 1
            fi

            if [[ "$HAS_AUTO_LABEL" == "true" && "$INCOMPLETE_COUNT" == "0" && ( "$MERGE_STATE" == "CLEAN" || "$MERGE_STATE" == "HAS_HOOKS" ) ]]; then
              break
            fi

            echo "PR #$PR_NUMBER is not ready yet (attempt $attempt/6): has_auto_label=$HAS_AUTO_LABEL incomplete_count=$INCOMPLETE_COUNT merge_state=$MERGE_STATE"

            if [[ "$attempt" -lt 6 ]]; then
              sleep 10
            fi
          done

          if [[ "$HAS_AUTO_LABEL" != "true" ]]; then
            echo "PR #$PR_NUMBER is not in the safe auto-merge lane."
            exit 0
          fi

          if [[ "$INCOMPLETE_COUNT" != "0" ]]; then
            echo "PR #$PR_NUMBER still has pending or failing checks after the retry window."
            exit 0
          fi

          if [[ "$MERGE_STATE" != "CLEAN" && "$MERGE_STATE" != "HAS_HOOKS" ]]; then
            echo "PR #$PR_NUMBER is not mergeable yet after the retry window (mergeStateStatus=$MERGE_STATE)."
            exit 0
          fi

          gh pr merge "$PR_NUMBER" --squash --delete-branch
