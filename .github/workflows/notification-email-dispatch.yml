name: Notification Email Dispatch Scheduler

on:
  schedule:
    # Temporary production bridge while Vercel remains on Hobby and QStash is not
    # in use. Run away from the top and half hour to reduce GitHub schedule delay.
    - cron: "17,47 * * * *"
  workflow_dispatch:
    inputs:
      target_url:
        description: "Optional app origin override, for example a preview URL. Scheduled runs default to production."
        required: false
        type: string

permissions: {}

concurrency:
  group: notification-email-dispatch
  cancel-in-progress: false

jobs:
  dispatch:
    name: Dispatch notification emails
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 5
    env:
      DISPATCH_URL: ${{ github.event.inputs.target_url || 'https://nexus-dash.app' }}
      DISPATCH_SECRET: ${{ secrets.NOTIFICATION_EMAIL_DISPATCH_SECRET || secrets.CRON_SECRET }}

    steps:
      - name: Validate dispatch configuration
        run: |
          missing=0
          if [ -z "$DISPATCH_URL" ]; then
            echo "::error::Missing notification email dispatch target URL."
            missing=1
          fi
          if [ -z "$DISPATCH_SECRET" ]; then
            echo "::error::Missing GitHub secret NOTIFICATION_EMAIL_DISPATCH_SECRET or CRON_SECRET."
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

          dispatch_origin="${DISPATCH_URL%/}"
          if [ "$dispatch_origin" != "https://nexus-dash.app" ] \
            && [ "$dispatch_origin" != "https://nexus-dash-dorian-agaesses-projects.vercel.app" ] \
            && [ "$dispatch_origin" != "https://nexus-dash-dorianagaesse-3732-dorian-agaesses-projects.vercel.app" ] \
            && ! [[ "$dispatch_origin" =~ ^https://nexus-dash-[a-z0-9-]+-dorian-agaesses-projects\.vercel\.app$ ]]; then
            echo "::error::Notification email dispatch target URL is not an allowed NexusDash origin."
            echo "::error::Use https://nexus-dash.app or this project's Vercel deployment domains only."
            exit 1
          fi

      - name: Call notification email dispatcher
        run: |
          dispatch_origin="${DISPATCH_URL%/}"
          set +e
          response="$(curl --fail-with-body --silent --show-error --max-time 120 \
            --header "x-notification-email-dispatch-secret: $DISPATCH_SECRET" \
            "$dispatch_origin/api/cron/notification-emails" 2>&1)"
          curl_status=$?
          set -e

          echo "$response"
          parsed_summary="$(RESPONSE_JSON="$response" node <<'NODE'
          const raw = process.env.RESPONSE_JSON ?? "";
          try {
            const payload = JSON.parse(raw);
            const summary = payload.summary ?? {};
            const line = (label, key) => {
              const value = Object.prototype.hasOwnProperty.call(summary, key)
                ? summary[key]
                : "n/a";
              return `- ${label}: \`${value}\``;
            };

            console.log(line("Due-date reminders reconciled", "dueDateRemindersReconciled"));
            console.log(line("Meeting todo overdue reminders reconciled", "meetingTodoOverdueRemindersReconciled"));
            console.log(line("Notifications reconciled", "notificationsReconciled"));
            console.log(line("Groups claimed", "groupsClaimed"));
            console.log(line("Scheduler lag groups measured", "schedulerLagGroupsMeasured"));
            console.log(line("Max scheduler lag minutes", "schedulerLagMaxMinutes"));
            console.log(line("Average scheduler lag minutes", "schedulerLagAverageMinutes"));
            console.log(line("Recipient emails attempted", "recipientEmailsAttempted"));
            console.log(line("Recipient emails sent", "recipientEmailsSent"));
            console.log(line("Recipient emails skipped", "recipientEmailsSkipped"));
            console.log(line("Recipient emails failed", "recipientEmailsFailed"));
            console.log(line("Groups sent", "groupsSent"));
            console.log(line("Groups skipped", "groupsSkipped"));
            console.log(line("Groups failed", "groupsFailed"));
            console.log(line("Errors", "errors"));
          } catch {
            console.log("- Parsed summary: `unavailable; dispatcher response was not JSON`");
          }
          NODE
          )"
          {
            echo "## Notification Email Dispatch"
            echo
            echo "- Trigger: \`${{ github.event_name }}\`"
            echo "- Target origin: \`$dispatch_origin\`"
            echo "- Curl exit code: \`$curl_status\`"
            echo
            echo "### Parsed Summary"
            echo
            echo "$parsed_summary"
            echo
            echo "- Response/output:"
            echo
            echo '```text'
            echo "$response"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$curl_status" -ne 0 ]; then
            echo "::error::Notification email dispatch failed with curl exit code $curl_status."
            exit "$curl_status"
          fi
